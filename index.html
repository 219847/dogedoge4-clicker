
<!DOCTYPE html>
<html>
<head>
<title>dogedoge4 Clicker</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body {
background-color:blue;
font-family:"Ubuntu";
font-weight: bold;
}
h2{
color:yellow;  
}
h3 {
color:rgb(255,255,255);
}
.upgrade {
	font-family:"Ubuntu";
	background-color:rgb(0,180,255);
}
.item {
	font-family:"Ubuntu";
	background-color:rgb(2,242,242);
}
</style>
</head>
<body>
<script>
var bottles=0;
var upgrade0BPCincs=0;
var item0AutoClickers=0;

var bottlespsec=0;
var bottlespclick=1;
	
var shop1price=10;
var shop2price=5;
var firstPrice=25;
var secondPrice=100;
var thirdPrice=923;
var fourthPrice=6766;
	
function increase(){
bottles+=bottlespclick;
updateInfo()
}
function updateInfo(){
  document.getElementById("count").innerText="Bottles: "+bottles.toFixed(2); 
  document.getElementById("bottlespsec").innerText="Bottles per sec: "+bottlespsec.toFixed(2);
  document.getElementById("bottlespclick").innerText="Bottles per click: "+bottlespclick.toFixed(2);
}
function BPCinc(){
	if (bottles>=shop1price) {
    bottlespclick+=1;
    bottles-=shop1price;
    shop1price*=1.75;
    updateInfo()
    document.getElementById("IncClick").innerText="Increase bottles per click price: "+shop1price.toFixed(2);
	upgrade0BPCincs+=1;
    }
}
function autoClickBuy(){
	if (bottles>=shop2price) {
    bottlespclick+=0.1;
	bottlespsec+=0.1;
    bottles-=shop2price;
    shop2price*=1.35;
    updateInfo()
    document.getElementById("autoClick").innerText="Auto Clicker Price: "+shop2price.toFixed(2);
	item0AutoClickers+=1;
    }
}
function buyFirst() {
	if (bottles>=firstPrice) {
    bottlespsec+=1;
    bottles-=firstPrice;
    firstPrice*=1.75;
    updateInfo()
    document.getElementById("autog").innerText="Auto g Price: "+firstPrice.toFixed(2);
    }
}
function buySecond() {
	if (bottles>=secondPrice) {
    bottlespsec+=3;
    bottles-=secondPrice;
    secondPrice*=1.75;
    updateInfo()
    document.getElementById("babyant").innerText="Baby Ant Price: "+secondPrice.toFixed(2);
    }
}
function buyThird() {
	if (bottles>=thirdPrice) {
    bottlespsec+=10;
    bottles-=thirdPrice;
    thirdPrice*=1.75;
    updateInfo()
    document.getElementById("queenant").innerText="Queen Ant Price: "+thirdPrice.toFixed(2);
    }
}
function buyFourth() {
	if (bottles>=fourthPrice) {
    bottlespsec+=35;
    bottles-=fourthPrice;
    fourthPrice*=1.75;
    updateInfo()
    document.getElementById("scorpion").innerText="Scorpion Price: "+fourthPrice.toFixed(2);
    }
}
setInterval(function perSecondIncome() {
  bottles+=bottlespsec/25;
  updateInfo()
}, 40);
</script>

<h1 style="color:#2bffa3">dogedoge4 Clicker</h1><div></div>
<button id="button" onclick="increase()" class="upgrade"><img src="https://raw.githubusercontent.com/219847/dogedoge4-clicker/refs/heads/main/clickstock.webp" alt="Image did not load; it may have been blocked by your ISP."></button>
<div></div>
<h2 id="count">Bottles: 0.00</h2>
<h3 id="bottlespclick">Bottles per click: 1.00</h3>
<h3 id="bottlespsec">Bottles per sec: 0.00</h3>
<h2>Shop</h2>
<h3>Hover over buttons for more info.</h3>
<h3>Upgrades</h3>
<button id="IncClick" class="upgrade" onclick="BPCinc()" title="Gives you 1 more bottle per click.">Increase bottles per click price: 10.00</button>
<h3>Items (and mobs dogedoge4 likes)</h3>
<button id="autoClick" onclick="autoClickBuy()" class="item" title="Gives you +0.1BPC and +0.1BPS">Auto Clicker Price: 5.00</button>
<button id="autog" onclick="buyFirst()" class="item" title="Gives you 1 more bottle per second">Auto g price: 25.00</button>
<button id="babyant" onclick="buySecond()" class="item" title="Gives you 3 more bottles per second">Baby Ant Price: 100.00</button>
<button id="queenant" onclick="buyThird()" class="item" title="Gives you 10 more bottles per second">Queen Ant Price: 923.00</button>
<button id="scorpion" onclick="buyFourth()" class="item" title="Gives you 35 more bottles per second">Scorpion Price: 6766.00</button>
<div>‎ </div>
<h2>Chat</h2>
<iframe src="https://219847.github.io/chat-window-for-iframe" height="350px" width="600px"></iframe>

<h4 style="color:rgb(2,242,242);">Made by <a href="https://github.com/219847/" style="color:rgb(2,242,242);">219847</a><br>Chat window phrases and formatting from the game florr.io.</h4>
</body>
</html>
